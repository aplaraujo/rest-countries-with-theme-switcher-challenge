<app-header />

<main class="container">
    <form class="form-container" [formGroup]="countryForm">
        <label for="search">
            <div class="search-container">
                <div class="search-icon"></div>
                <input type="text" placeholder="Search for a country...">
            </div>
        </label>
        <label for="region">
            <select (change)="handleSelect($event)" name="region" id="region" class="region-select"
                formControlName="region">
                <option value="">Filter by Region</option>
                @for(region of regionArr; track region) {
                <option [value]="region">{{region}}</option>
                }
            </select>
        </label>
    </form>

    <ul class="country-container">
        @for(country of countryList | regionFilter : regionOption; track country) {
        <li class="country-card">
            <img src="{{country.flag}}" alt="{{country.name}}" class="country-image">
            <div class="country-content">
                <h2>{{country.name}}</h2>
                <div class="country-content-info">
                    <p><span class="info">Population:</span> {{country.population}}</p>
                    <p><span class="info">Region:</span> {{country.region}}</p>
                    <p><span class="info">Capital:</span> {{country.capital}}</p>
                </div>
            </div>
        </li>
        }
    </ul>
</main>
